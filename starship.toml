# Catppuccin Mocha palette
palette = "catppuccin_mocha"

format = """
$directory\
$git_branch\
$git_status\
$kubernetes\
$aws\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "bold lavender"
truncation_length = 3
truncation_symbol = ".../"

[git_branch]
symbol = " "
style = "bold mauve"
format = "on [$symbol$branch]($style) "

[git_status]
modified = "[~${count}](peach) "
staged = "[+${count}](green) "
untracked = "[?${count}](overlay1) "
deleted = "[-${count}](red) "
ahead = "[⇡${count}](teal) "
behind = "[⇣${count}](flamingo) "
diverged = "[⇕⇡${ahead_count}⇣${behind_count}](red) "
conflicted = "[=${count}](red) "
stashed = "[*${count}](mauve) "
format = "$all_status$ahead_behind"

[kubernetes]
disabled = false
symbol = "󱃾 "
style = "bold blue"
format = "at [$symbol$context]($style) "
detect_files = ["Dockerfile", "k8s"]
detect_folders = ["k8s", "kubernetes", "helm"]

[aws]
symbol = " "
style = "bold yellow"
format = "on [$symbol$profile]($style) "

[cmd_duration]
min_time = 2_000
style = "subtext0"
format = "took [$duration]($style) "

[character]
success_symbol = "[❯](mauve)"
error_symbol = "[❯](red)"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
