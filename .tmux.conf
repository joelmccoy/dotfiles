unbind r
bind r source-file ~/.tmux.conf
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Set prefix to C-a
set -g prefix C-a
set-option -g prefix2 C-b

# Set pane navigation to vim keys
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r h select-pane -L

# Sets m to maximize pane
bind -r m resize-pane -Z

# Nice for resizing panes with mouse
set -g mouse on

# Set escape timeout so no delay in nvim
set-option -sg escape-time 10

# Pass extended key events through (needed for push-to-talk, etc.)
set -g extended-keys on

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Save/restore sessions across reboots
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# Status bar theme
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_current_text "#{window_name}"
set -g @catppuccin_window_text "#{window_name}#{?window_bell_flag, 󰂞 ,}"
set -g @catppuccin_status_modules_right "directory date_time"
set -g @catppuccin_date_time_text "%H:%M"
# Hide session name from status bar left
set -g status-left ""

# Bell monitoring - highlight window when Claude needs input
set -g monitor-bell on
set -g bell-action any
set -g visual-bell off

# Pass tmux session name to terminal (Ghostty tab title)
set -g set-titles on
set -g set-titles-string "#{session_name}"

# Make sure this is at the very bottom of tmux config
run '~/.tmux/plugins/tpm/tpm'
